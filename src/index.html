<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7Seven</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-layout">
        
        <!-- Glass Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <i class="fas fa-layer-group"></i>
                <span>7Seven</span>
            </div>

            <nav class="nav-links">
                <a class="nav-item active" onclick="handleAction('Menu Principal', this)">
                    <i class="fas fa-home"></i> <span>Dashboard</span>
                </a>
                <a class="nav-item" onclick="handleAction('Venda Direta', this)">
                    <i class="fas fa-bolt"></i> <span>Venda Rápida</span>
                </a>
                <a class="nav-item" onclick="handleAction('Mesas', this)">
                    <i class="fas fa-chair"></i> <span>Mesas</span>
                </a>
                <a class="nav-item" onclick="handleAction('Caixa', this)">
                    <i class="fas fa-cash-register"></i> <span>Fluxo de Caixa</span>
                </a>
                <a class="nav-item" onclick="handleAction('Estoque', this)">
                    <i class="fas fa-boxes"></i> <span>Estoque</span>
                </a>
                <a class="nav-item" onclick="handleAction('Relatórios', this)">
                    <i class="fas fa-chart-pie"></i> <span>Relatórios</span>
                </a>
            </nav>

            <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
                <a class="nav-item" onclick="handleAction('Configurações', this)">
                    <i class="fas fa-cog"></i> <span>Configurações</span>
                </a>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="main-area">
            
            <header class="page-header">
                <div>
                    <h1 class="page-title" id="page-title">Dashboard</h1>
                    <p style="color: var(--text-muted); margin-top: 4px;">Bem vindo ao sistema de PDV.</p>
                </div>
                
                <div style="display: flex; gap: 16px; align-items: center;">
                    <span style="background: rgba(16, 185, 129, 0.2); color: #34d399; padding: 6px 12px; border-radius: 20px; font-size: 14px; font-weight: 600;"><i class="fas fa-circle" style="font-size: 10px; margin-right: 6px;"></i>Sistema Online</span>
                    <button class="btn btn-outline" style="padding: 10px; border-radius: 50%; width: 42px; height: 42px;"><i class="fas fa-bell"></i></button>
                    <div style="width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; font-weight: bold; color: white;">
                        AD
                    </div>
                </div>
            </header>

            <div id="content-container">
                <!-- PÁGINA INICIAL INJETADA AQUI (OU O TEMPLATE ABAIXO SE MANTÉM, LOGO SUBSTITUIDO) -->
                <div class="glass-grid" id="home-menu">
                    <div class="glass-card" onclick="handleAction('Venda Direta')">
                        <i class="fas fa-bolt"></i>
                        <h3>Venda Rápida</h3>
                        <p style="font-size: 13px; color: var(--text-muted); margin-top: 8px;">Nova venda avulsa</p>
                    </div>
                    <div class="glass-card" onclick="handleAction('Mesas')">
                        <i class="fas fa-chair"></i>
                        <h3>Controle de Mesas</h3>
                        <p style="font-size: 13px; color: var(--text-muted); margin-top: 8px;">Abertura e consumo</p>
                    </div>
                    <div class="glass-card" onclick="handleAction('Caixa')">
                        <i class="fas fa-cash-register"></i>
                        <h3>Fluxo de Caixa</h3>
                        <p style="font-size: 13px; color: var(--text-muted); margin-top: 8px;">Resumo e Sangria</p>
                    </div>
                    <div class="glass-card" onclick="handleAction('Estoque')">
                        <i class="fas fa-box-open"></i>
                        <h3>Estoque</h3>
                        <p style="font-size: 13px; color: var(--text-muted); margin-top: 8px;">Gerenciar produtos</p>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Container for dynamic toasts -->
    <div id="toast-container"></div>
    
    <!-- Área de Impressão de Cupons -->
    <div id="print-area"></div>

    <!-- Global Scripts -->
    <script src="script.js"></script>
</body>
</html>
